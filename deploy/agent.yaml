# Copyright Contributors to the KubeOpenCode project
# Unified agent configuration - capabilities defined by .claude/skills/ in the repo.
# Adding a new capability = adding a SKILL.md file via PR.
#
# Inherits images, credentials, contexts, workspaceDir, and serviceAccountName
# from the kubeopencode-base AgentTemplate. Only agent-specific settings here.
apiVersion: kubeopencode.io/v1alpha1
kind: Agent
metadata:
  name: kubeopencode-agent
spec:
  templateRef:
    name: kubeopencode-base
  profile: "KubeOpenCode agent — PR review, refactoring, dependency updates, GitHub and Slack responses, community operations"
  # Handles parallel tasks (GitHub event + scheduled + Slack)
  maxConcurrentTasks: 3
  # Rate limiting: max 200 tasks per 24 hours
  quota:
    maxTaskStarts: 200
    windowSeconds: 86400
  # Auto-suspend after 30 minutes idle, auto-resume when a new Task arrives.
  # Most triggers are CronJobs (daily/3-day/weekly), so the agent is idle most of the time.
  standby:
    idleTimeout: "30m"
  # Session persistence: conversation history survives pod restarts
  persistence:
    sessions:
      size: "1Gi"
  # OpenCode Go subscription using DeepSeek V4 Flash with high reasoning
  config:
    model: opencode-go/deepseek-v4-flash
    small_model: opencode-go/deepseek-v4-flash
    share: disabled
    autoupdate: false
    provider:
      opencode-go:
        models:
          deepseek-v4-flash:
            options:
              reasoningEffort: high
    agent:
      general:
        model: opencode-go/deepseek-v4-flash
